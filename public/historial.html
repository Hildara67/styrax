<!DOCTYPE html>
<html lang="es" class="bg-operador">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial - Sistema Riego</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <div class="header-logo"><img src="logosolo.png" class="header-logo-icon" alt="Sistema Riego" width="45" height="45"><img src="nombresolo.png" class="header-name-icon" alt="nombre" height="40"></div>
      <nav class="main-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="captura.html">Capturar</a>
        <a href="recomendaciones.html">Recomendaciones</a>
        <a href="historial.html" class="active">Historial</a>
      </nav>
    </div>
    <div class="header-right">
      <a href="../index.html" class="btn-home" title="Volver a inicio">🏠</a>
      <div class="header-user">
        <span id="userName"></span>
        <span class="rol-badge" id="userRol"></span>
      </div>
      <button class="btn btn-secondary btn-sm" id="btnCerrarSesion">Cerrar Sesión</button>
    </div>
  </header>

  <main class="main-container">
    <h1 class="page-title">Historial Operativo</h1>

    <h3 style="font-size:16px;margin-bottom:12px;">Filtros de Búsqueda</h3>
    <div class="filtros-bar">
      <div class="form-group">
        <label for="filtroParcela">Parcela</label>
        <select id="filtroParcela">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="form-group">
        <label for="filtroDesde">Desde</label>
        <input type="date" id="filtroDesde">
      </div>
      <div class="form-group">
        <label for="filtroHasta">Hasta</label>
        <input type="date" id="filtroHasta">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary btn-sm" id="btnFiltrar">🔍 Filtrar</button>
        <button class="btn btn-secondary btn-sm" id="btnExportarCSV">📥 Exportar CSV</button>
      </div>
    </div>

    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Parcela</th>
              <th>Humedad (%)</th>
              <th>Temperatura (°C)</th>
              <th>HR (%)</th>
              <th>Origen</th>
              <th>Válida</th>
            </tr>
          </thead>
          <tbody id="tablaHistorial">
            <tr><td colspan="7" style="text-align:center;color:var(--gris-400);">Seleccione filtros y presione Filtrar</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">Cargando historial...</div>
  </div>

  <script src="js/mock-api.js"></script>
  <script src="js/historial.js"></script>
  <script src="js/inactividad.js"></script>
</body>
</html>
